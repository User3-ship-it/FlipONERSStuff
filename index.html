<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlipONER'S Stuff</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0e0e11;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#141418;
position:sticky;
top:0;
}

nav h1{
font-size:22px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
opacity:.8;
}

nav a:hover{
opacity:1;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h2{
font-size:48px;
margin-bottom:10px;
}

.hero p{
opacity:.7;
}

/* GAMES SECTION */

.games{
padding:60px 40px;
}

.games h3{
font-size:28px;
margin-bottom:30px;
}

/* GAME CARD */

.game-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.game-card{
background:#18181f;
border-radius:14px;
overflow:hidden;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.game-card:hover{
transform:translateY(-6px);
}

.game-card img{
width:100%;
height:160px;
object-fit:cover;
}

.game-info{
padding:18px;
}

.game-info h4{
margin-bottom:10px;
}

/* META BUTTON */

.meta-btn{
display:inline-block;
margin-top:10px;
padding:10px 18px;
border-radius:10px;
background:linear-gradient(90deg,#3aa0ff,#5c6cff);
color:white;
text-decoration:none;
font-weight:bold;
transition:.2s;
}

.meta-btn:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(60,120,255,.4);
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
opacity:.5;
}

/* MOBILE */

@media(max-width:600px){

.hero h2{
font-size:36px;
}

nav{
padding:15px;
}

}

</style>
</head>

<body>

<nav>
<h1>FlipONER'S Stuff</h1>

<div>
<a href="index.html">Home</a>
<a href="privacy.html">Privacy</a>
</div>
</nav>

<section class="hero">
<h2>FlipONER'S Stuff</h2>
<p>Games and projects</p>
</section>

<section class="games">

<h3>Games</h3>

<div class="game-grid">

<div class="game-card">

<img src="https://i.imgur.com/W5Jz2pA.png">

<div class="game-info">

<h4>Apes</h4>

<p>VR movement based game inspired by gorilla locomotion.</p>

<a class="meta-btn" href="https://www.meta.com/experiences/apes/26596899476596626/?require_login=true">
Play on Meta
</a>

</div>
</div>

</div>

</section>

<footer>
© FlipONER
</footer>

</body>
</html>
